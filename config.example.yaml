api_keys:
  # data.go.kr > 마이페이지 > 인증키 관리 > 일반 인증키(디코딩) 값을 복사하세요
  kma_service_key: "YOUR_KMA_SERVICE_KEY"
  airkorea_service_key: "YOUR_AIRKOREA_SERVICE_KEY"

locations:
  - name: "집"
    address: "서울시 강남구 테헤란로 1" # 주소 → lat/lng 자동 변환 (kakao REST API 키 사용)
    # lat/lng를 직접 입력하면 address 대신 사용됩니다
    # lat: 37.5172
    # lng: 127.0473
    # air_station 생략 시 위치 기반으로 가장 가까운 측정소 자동 선택
    # air_station: "강남구"
  - name: "회사"
    address: "서울시 종로구 세종대로 1"

kakao:
  # https://developers.kakao.com > 내 애플리케이션 > 앱 키 > REST API 키
  client_id: "YOUR_KAKAO_REST_API_KEY"
  client_secret: "YOUR_KAKAO_CLIENT_SECRET"  # 앱 > 플랫폼 키 > REST API 키 > 클라이언트 시크릿
  redirect_uri: "http://localhost:8080/callback"
  # 아래 필드는 scripts/kakao_auth.py 실행 후 자동으로 채워집니다
  access_token: ""
  refresh_token: ""
  token_expires_at: ""
  refresh_token_expires_at: ""

logging:
  log_file: "logs/briefing.log"
  max_bytes: 1048576 # 1MB
  backup_count: 5
